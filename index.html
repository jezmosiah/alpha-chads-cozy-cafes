<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Chads Cozy Cafes</title>
  </head>
  <body class="day-theme">
    <div class="preloader">
      <div class="preloader__inner">
        <div class="preloader__progress-wrapper">
          <div class="preloader__progress-bar"></div>
        </div>
      </div>
    </div>

    <!-- Left side - Chad -->
    <div id="ui-chad" class="ui-panel">
      <div class="night-toggle" id="night-toggle-chad">
        <div class="night-toggle__track">
          <div class="night-toggle__thumb"></div>
        </div>
        <span class="night-toggle__icon">☀️</span>
      </div>

      <div class="preloader preloader--chad">
        <div class="preloader__inner">
          <div class="preloader__progress-wrapper">
            <div
              class="preloader__progress-bar preloader__progress-bar--chad"
            ></div>
          </div>
        </div>
      </div>

      <div id="project-one-chad" class="modal">
        <div class="modal__wrapper">
          <h1 class="modal__title">Project One Chad</h1>
          <p class="modal__paragraph">Yo 1</p>
          <button class="modal__close-button">Close</button>
        </div>
      </div>
      <div id="project-two-chad" class="modal">
        <div class="modal__wrapper">
          <h1 class="modal__title">Project Two Chad</h1>
          <p class="modal__paragraph">Yo 2</p>
          <button class="modal__close-button">Close</button>
        </div>
      </div>
    </div>

    <!-- Right side - Capybara -->
    <div id="ui-capybara" class="ui-panel">
      <div class="night-toggle" id="night-toggle-capybara">
        <div class="night-toggle__track">
          <div class="night-toggle__thumb"></div>
        </div>
        <span class="night-toggle__icon">☀️</span>
      </div>

      <div class="preloader preloader--capybara">
        <div class="preloader__inner">
          <div class="preloader__progress-wrapper">
            <div
              class="preloader__progress-bar preloader__progress-bar--capybara"
            ></div>
          </div>
        </div>
      </div>

      <div id="project-one-capybara" class="modal">
        <div class="modal__wrapper">
          <h1 class="modal__title">Project One Capybara</h1>
          <p class="modal__paragraph">Yo 1</p>
          <button class="modal__close-button">Close</button>
        </div>
      </div>
      <div id="project-two-capybara" class="modal">
        <div class="modal__wrapper">
          <h1 class="modal__title">Project Two Capybara</h1>
          <p class="modal__paragraph">Yo 2</p>
          <button class="modal__close-button">Close</button>
        </div>
      </div>
    </div>

    <div id="compare-slider">
      <div id="compare-slider__line"></div>
      <div id="compare-slider__handle">⇔</div>
    </div>

    <div id="experience-wrapper">
      <canvas id="experience-canvas"></canvas>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
